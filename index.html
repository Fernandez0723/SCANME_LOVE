<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson - Week 13</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #fdf6e3;
    color: #333;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .lesson-container {
    max-width: 900px;
    width: 100%;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    padding: 40px;
    margin-bottom: 30px;
  }

  .lesson-header {
    text-align: center;
    margin-bottom: 25px;
  }

  .lesson-header h1 {
    font-size: 2em;
    font-weight: 700;
    color: #f1c40f;
    margin: 0;
  }

  .lesson-header h2 {
    font-size: 1.4em;
    font-weight: 600;
    color: #0052cc;
    margin-top: 8px;
  }

  .lesson-content p {
    font-size: 1em;
    line-height: 1.6;
    margin-bottom: 15px;
  }

  .highlight {
    background: #fffae6;
    border-left: 5px solid #f1c40f;
    padding: 12px 18px;
    border-radius: 10px;
    margin: 12px 0;
  }

  @media(max-width:768px){
    .lesson-container{padding:30px 20px;}
    .lesson-header h1{font-size:1.8em;}
    .lesson-header h2{font-size:1.2em;}
  }
  @media(max-width:480px){
    .lesson-container{padding:20px 15px;}
    .lesson-header h1{font-size:1.6em;}
    .lesson-header h2{font-size:1em;}
  }
</style>
</head>
<body>
<div class="lesson-container">
  <div class="lesson-header">
    <h1>Week 13</h1>
    <h2>Understanding the Self – Eastern & Western Perspectives- PROTOTYPE ONLY</h2>
  </div>

  <div class="lesson-content">
    <!-- Generate 100 dummy paragraphs -->
    <script>
      const lessonContentDiv = document.currentScript.parentNode;
      for(let i=1; i<=100; i++){
        const p = document.createElement("p");
        p.textContent = `Paragraph ${i}: Lorem ipsum dolor sit amet, consectetur adipiscing elit. 
        Integer nec odio. Praesent libero. Sed cursus ante dapibus diam. Sed nisi. 
        Nulla quis sem at nibh elementum imperdiet. Duis sagittis ipsum. Praesent mauris. 
        Fusce nec tellus sed augue semper porta. Mauris massa. ${i} This is example content for testing layout with long lesson text.`;
        lessonContentDiv.appendChild(p);
      }
    </script>
  </div>
</div>
</body>
</html>
