<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Montserrat',sans-serif;
    height:100vh;
    overflow:hidden;

    /* BACKGROUND IMAGE WITH SOFT OVERLAY */
    background: 
        linear-gradient(rgba(255,182,193,0.3), rgba(255,182,193,0.3)),
        url('Screenshot 2026-03-09 131651.png') no-repeat center center;
    background-size:cover;
}

/* MUSIC CONTROL BUTTONS */
#musicControls{
    position:fixed;
    top:20px;
    left:20px;
    z-index:20;
    display:flex;
    gap:10px;
}

#musicControls button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:#ff2e63;
    color:white;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 4px 6px rgba(0,0,0,0.3);
    transition:0.2s;
}

#musicControls button:hover{
    transform:scale(1.1);
}

/* FULLSCREEN GALLERY */
.gallery{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* SLIDE */
.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    display:flex;
    justify-content:center;
    align-items:center;
    animation:fadeSlide 160s infinite;
}

.slide img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    object-position:center center;
    transition: transform 1s ease;
}

/* DIFFERENT DELAYS FOR 32 SLIDES */
.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:5s;}
.slide:nth-child(3){animation-delay:10s;}
.slide:nth-child(4){animation-delay:15s;}
.slide:nth-child(5){animation-delay:20s;}
.slide:nth-child(6){animation-delay:25s;}
.slide:nth-child(7){animation-delay:30s;}
.slide:nth-child(8){animation-delay:35s;}
.slide:nth-child(9){animation-delay:40s;}
.slide:nth-child(10){animation-delay:45s;}
.slide:nth-child(11){animation-delay:50s;}
.slide:nth-child(12){animation-delay:55s;}
.slide:nth-child(13){animation-delay:60s;}
.slide:nth-child(14){animation-delay:65s;}
.slide:nth-child(15){animation-delay:70s;}
.slide:nth-child(16){animation-delay:75s;}
.slide:nth-child(17){animation-delay:80s;}
.slide:nth-child(18){animation-delay:85s;}
.slide:nth-child(19){animation-delay:90s;}
.slide:nth-child(20){animation-delay:95s;}
.slide:nth-child(21){animation-delay:100s;}
.slide:nth-child(22){animation-delay:105s;}
.slide:nth-child(23){animation-delay:110s;}
.slide:nth-child(24){animation-delay:115s;}
.slide:nth-child(25){animation-delay:120s;}
.slide:nth-child(26){animation-delay:125s;}
.slide:nth-child(27){animation-delay:130s;}
.slide:nth-child(28){animation-delay:135s;}
.slide:nth-child(29){animation-delay:140s;}
.slide:nth-child(30){animation-delay:145s;}
.slide:nth-child(31){animation-delay:150s;}
.slide:nth-child(32){animation-delay:155s;}

@keyframes fadeSlide{
    0%{opacity:0;}
    3%{opacity:1;}
    8%{opacity:1;}
    11%{opacity:0;}
    100%{opacity:0;}
}

/* HEARTS */
.heart{
    position:absolute;
    bottom:-50px;
    color:red;
    font-size:25px;
    animation:floatHeart linear infinite;
}

@keyframes floatHeart{
    0%{transform:translateY(0) scale(1);opacity:1;}
    100%{transform:translateY(-100vh) scale(1.5);opacity:0;}
}

@media (max-width:1024px){
    .heart{font-size:18px;}
}
@media(max-width:768px){
    .heart{font-size:16px;}
}
@media(max-width:480px){
    .heart{font-size:14px;}
}
</style>
</head>
<body>

<!-- MUSIC CONTROLS -->
<div id="musicControls">
    <button id="playBtn">Play</button>
    <button id="stopBtn">Stop</button>
</div>

<!-- AUDIO ELEMENT -->
<audio id="bgMusic" loop>
    <source src="El Manu - Tahanan (lyrics).mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<!-- IMAGE GALLERY -->
<div class="gallery">
    <div class="slide"><img src="images/1st.jpg" alt="Slide 1"></div>
    <div class="slide"><img src="images/2nd.jpg" alt="Slide 2"></div>
    <div class="slide"><img src="images/3rd.jpg" alt="Slide 3"></div>
    <div class="slide"><img src="images/4rth.jpg" alt="Slide 4"></div>
    <div class="slide"><img src="images/5th.jpg" alt="Slide 5"></div>
    <div class="slide"><img src="images/6th.jpg" alt="Slide 6"></div>
    <div class="slide"><img src="images/7th.jpg" alt="Slide 7"></div>
    <div class="slide"><img src="images/8th.jpg" alt="Slide 8"></div>
    <div class="slide"><img src="images/9th.jpg" alt="Slide 9"></div>
    <div class="slide"><img src="images/10th.jpg" alt="Slide 10"></div>
    <div class="slide"><img src="images/11th.jpg" alt="Slide 11"></div>
    <div class="slide"><img src="images/12th.jpg" alt="Slide 12"></div>
    <div class="slide"><img src="images/13th.jpg" alt="Slide 13"></div>
    <div class="slide"><img src="images/14th.jpg" alt="Slide 14"></div>
    <div class="slide"><img src="images/15th.jpg" alt="Slide 15"></div>
    <div class="slide"><img src="images/16th.jpg" alt="Slide 16"></div>
    <div class="slide"><img src="images/17th.jpg" alt="Slide 17"></div>
    <div class="slide"><img src="images/18th.jpg" alt="Slide 18"></div>
    <div class="slide"><img src="images/19th.jpg" alt="Slide 19"></div>
    <div class="slide"><img src="images/20th.jpg" alt="Slide 20"></div>
    <div class="slide"><img src="images/21th.jpg" alt="Slide 21"></div>
    <div class="slide"><img src="images/22th.jpg" alt="Slide 22"></div>
    <div class="slide"><img src="images/23th.jpg" alt="Slide 23"></div>
    <div class="slide"><img src="images/24th.jpg" alt="Slide 24"></div>
    <div class="slide"><img src="images/25th.jpg" alt="Slide 25"></div>
    <div class="slide"><img src="images/26th.jpg" alt="Slide 26"></div>
    <div class="slide"><img src="images/27th.jpg" alt="Slide 27"></div>
    <div class="slide"><img src="images/28th.jpg" alt="Slide 28"></div>
    <div class="slide"><img src="images/29th.jpg" alt="Slide 29"></div>
    <div class="slide"><img src="images/30th.jpg" alt="Slide 30"></div>
    <div class="slide"><img src="images/31th.jpg" alt="Slide 31"></div>
    <div class="slide"><img src="images/32th.jpg" alt="Slide 32"></div>
</div>

<script>
/* HEART GENERATOR */
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";

    let screenWidth = window.innerWidth;
    if(screenWidth>1024){ heart.style.fontSize=(20+Math.random()*20)+"px"; }
    else if(screenWidth>768){ heart.style.fontSize=(15+Math.random()*10)+"px"; }
    else{ heart.style.fontSize=(12+Math.random()*8)+"px"; }

    heart.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>{ heart.remove(); },7000);
}

setInterval(createHeart,500);

/* MUSIC PLAY & STOP */
const bgMusic = document.getElementById('bgMusic');
document.getElementById('playBtn').addEventListener('click', ()=>{
    bgMusic.play();
});
document.getElementById('stopBtn').addEventListener('click', ()=>{
    bgMusic.pause();
    bgMusic.currentTime = 0;
});
</script>

</body>
</html>
