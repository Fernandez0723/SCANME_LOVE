<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Montserrat',sans-serif;
    height:100vh;
    overflow:hidden;

    /* BACKGROUND IMAGE WITH SOFT OVERLAY */
    background: 
        linear-gradient(rgba(255,182,193,0.3), rgba(255,182,193,0.3)),
        url('Screenshot 2026-03-09 131651.png') no-repeat center center;
    background-size:cover;
}

/* MUSIC CONTROL BUTTONS */
#musicControls{
    position:fixed;
    top:20px;
    left:20px;
    z-index:20;
    display:flex;
    gap:10px;
}

#musicControls button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:#ff2e63;
    color:white;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 4px 6px rgba(0,0,0,0.3);
    transition:0.2s;
}

#musicControls button:hover{
    transform:scale(1.1);
}

/* FULLSCREEN GALLERY */
.gallery{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* SLIDE */
.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    display:flex;
    justify-content:center;
    align-items:center;
    animation:fadeSlide 20s infinite;
}

.slide img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
    object-position:center center;
    transition: transform 1s ease;
}

.slide:nth-child(1){animation-delay:0s;}
.slide:nth-child(2){animation-delay:5s;}
.slide:nth-child(3){animation-delay:10s;}
.slide:nth-child(4){animation-delay:15s;}

@keyframes fadeSlide{
    0%{opacity:0;}
    10%{opacity:1;}
    25%{opacity:1;}
    35%{opacity:0;}
    100%{opacity:0;}
}

/* HEARTS */
.heart{
    position:absolute;
    bottom:-50px;
    color:red;
    font-size:25px;
    animation:floatHeart linear infinite;
}

@keyframes floatHeart{
    0%{transform:translateY(0) scale(1);opacity:1;}
    100%{transform:translateY(-100vh) scale(1.5);opacity:0;}
}

@media (max-width:1024px){
    .heart{font-size:18px;}
}
@media(max-width:768px){
    .heart{font-size:16px;}
}
@media(max-width:480px){
    .heart{font-size:14px;}
}
</style>
</head>
<body>

<!-- MUSIC CONTROLS -->
<div id="musicControls">
    <button id="playBtn">Play</button>
    <button id="stopBtn">Stop</button>
</div>

<!-- AUDIO ELEMENT -->
<audio id="bgMusic" loop>
    <source src="El Manu & Jessy Kang - Tahanan (Wedding Version) (Lyrics).mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<!-- IMAGE GALLERY -->
<div class="gallery">
    <div class="slide"><img src="images/b959dbc9-c842-4ba0-a21d-ff07cb15d835.jpg" alt="Slide 1"></div>
    <div class="slide"><img src="images/3809fd1d-9420-4b1b-9f18-58d72aa67849.jpg" alt="Slide 2"></div>
    <div class="slide"><img src="images/92b7b00c-4210-444b-b044-fa8436daa88f.jpg" alt="Slide 3"></div>
    <div class="slide"><img src="images/5ae1ca07-dcc0-4235-85d7-e207725396b9.jpg" alt="Slide 4"></div>
</div>

<script>
/* HEART GENERATOR */
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";
    heart.style.left=Math.random()*100+"vw";

    let screenWidth = window.innerWidth;
    if(screenWidth>1024){ heart.style.fontSize=(20+Math.random()*20)+"px"; }
    else if(screenWidth>768){ heart.style.fontSize=(15+Math.random()*10)+"px"; }
    else{ heart.style.fontSize=(12+Math.random()*8)+"px"; }

    heart.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(heart);
    setTimeout(()=>{ heart.remove(); },7000);
}

setInterval(createHeart,500);

/* MUSIC PLAY & STOP */
const bgMusic = document.getElementById('bgMusic');
document.getElementById('playBtn').addEventListener('click', ()=>{
    bgMusic.play();
});
document.getElementById('stopBtn').addEventListener('click', ()=>{
    bgMusic.pause();
    bgMusic.currentTime = 0;
});
</script>

</body>
</html>
