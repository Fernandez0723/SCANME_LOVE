<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Portal - Week Lessons</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #fdf6e3; /* soft background */
    color: #333;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .lesson-container {
    max-width: 900px;
    width: 100%;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    padding: 40px;
    margin-bottom: 30px;
  }

  .lesson-header {
    text-align: center;
    margin-bottom: 25px;
  }

  .lesson-header h1 {
    font-size: 2em;
    font-weight: 700;
    color: #f1c40f; /* Minions yellow */
    margin: 0;
  }

  .lesson-header h2 {
    font-size: 1.4em;
    font-weight: 600;
    color: #0052cc; /* Minions blue */
    margin-top: 8px;
  }

  .lesson-content p {
    font-size: 1em;
    line-height: 1.6;
    margin-bottom: 15px;
  }

  .highlight {
    background: #fffae6;
    border-left: 5px solid #f1c40f;
    padding: 12px 18px;
    border-radius: 10px;
    margin: 12px 0;
  }

  /* Responsive */
  @media(max-width:768px){
    .lesson-container{padding:30px 20px;}
    .lesson-header h1{font-size:1.8em;}
    .lesson-header h2{font-size:1.2em;}
  }
  @media(max-width:480px){
    .lesson-container{padding:20px 15px;}
    .lesson-header h1{font-size:1.6em;}
    .lesson-header h2{font-size:1em;}
  }
</style>
</head>
<body>

<div class="lesson-container" id="lesson-container">
  <div class="lesson-header">
    <h1 id="week-title">Week 13</h1>
    <h2 id="lesson-title">Understanding the Self – Eastern & Western Perspectives</h2>
  </div>
  <div class="lesson-content" id="lesson-content">
    <!-- Content will be injected dynamically -->
  </div>
</div>

<script>
  // Data for each week
  const lessons = {
    13: {
      title: "Understanding the Self – Eastern & Western Perspectives",
      content: `
        <p>This week, we explore the concept of the self from two perspectives:</p>
        <div class="highlight"><strong>Eastern Self:</strong> Interdependent, family-centered, harmonious, socially connected.</div>
        <div class="highlight"><strong>Western Self:</strong> Independent, autonomous, focused on self-expression and individuality.</div>
        <p>Activities:</p>
        <ul>
          <li>Compare collectivism vs individualism.</li>
          <li>Analyze social roles in different cultures.</li>
          <li>Create your personal reflection chart of Eastern vs Western self traits.</li>
        </ul>
      `
    },
    14: {
      title: "Self-Reflection Techniques",
      content: `
        <p>This week focuses on self-reflection and personal growth:</p>
        <div class="highlight"><strong>Journaling:</strong> Document daily thoughts and experiences.</div>
        <div class="highlight"><strong>Meditation:</strong> Observe your mind without judgment.</div>
        <p>Activities:</p>
        <ul>
          <li>Write 3 daily reflections.</li>
          <li>Try a 5-minute mindfulness meditation.</li>
          <li>Analyze patterns in your behavior.</li>
        </ul>
      `
    },
    15: {
      title: "Identity and Social Roles",
      content: `
        <p>Exploring how society shapes identity:</p>
        <div class="highlight"><strong>Social Roles:</strong> Examine your roles in family, school, and community.</div>
        <div class="highlight"><strong>Identity Formation:</strong> Understand influences from culture and peers.</div>
        <p>Activities:</p>
        <ul>
          <li>Make a social role map.</li>
          <li>Reflect on which roles align with your personal identity.</li>
        </ul>
      `
    },
    16: {
      title: "Autonomy and Decision-Making",
      content: `
        <p>This week covers independence and critical thinking:</p>
        <div class="highlight"><strong>Decision-Making:</strong> Learn to weigh options logically and ethically.</div>
        <div class="highlight"><strong>Autonomy:</strong> Understand how to act responsibly for yourself.</div>
        <p>Activities:</p>
        <ul>
          <li>Practice making small daily decisions consciously.</li>
          <li>Reflect on outcomes and adjust behavior.</li>
        </ul>
      `
    },
    17: {
      title: "Self-Expression and Personal Growth",
      content: `
        <p>Focus on expressing your uniqueness:</p>
        <div class="highlight"><strong>Creative Expression:</strong> Art, writing, or music.</div>
        <div class="highlight"><strong>Feedback:</strong> Seek constructive feedback from peers or mentors.</div>
        <p>Activities:</p>
        <ul>
          <li>Create a personal project showing your values and skills.</li>
          <li>Reflect on growth since Week 13.</li>
        </ul>
      `
    }
  };

  // Function to get week number from URL query
  function getWeekFromURL() {
    const params = new URLSearchParams(window.location.search);
    return params.get('week') || '13'; // default Week 13
  }

  const currentWeek = getWeekFromURL();
  const lesson = lessons[currentWeek];

  if(lesson){
    document.getElementById('week-title').innerText = `Week ${currentWeek}`;
    document.getElementById('lesson-title').innerText = lesson.title;
    document.getElementById('lesson-content').innerHTML = lesson.content;
  } else {
    document.getElementById('lesson-container').innerHTML = "<p>Lesson not found.</p>";
  }
</script>
</body>
</html>
