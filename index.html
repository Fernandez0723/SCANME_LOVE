<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 13 Lesson - Team Profiles</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: #fdf6e3;
    color: #333;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  .lesson-container {
    max-width: 900px;
    width: 100%;
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    padding: 40px;
  }

  .lesson-header {
    text-align: center;
    margin-bottom: 25px;
  }

  .lesson-header h1 {
    font-size: 2em;
    font-weight: 700;
    color: #f1c40f;
    margin: 0;
  }

  .lesson-header h2 {
    font-size: 1.4em;
    font-weight: 600;
    color: #0052cc;
    margin-top: 8px;
  }

  .lesson-content p {
    font-size: 1em;
    line-height: 1.6;
    margin-bottom: 15px;
  }

  .highlight {
    background: #fffae6;
    border-left: 5px solid #f1c40f;
    padding: 12px 18px;
    border-radius: 10px;
    margin: 12px 0;
  }

  /* Team / Profile section */
  .profile-section {
    text-align: center;
    margin-top: 50px;
    padding-top: 30px;
    border-top: 2px dashed #f1c40f;
  }

  .profile-section h3 {
    margin-bottom: 20px;
    color: #0052cc;
    font-weight: 600;
  }

  .team-grid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
  }

  .team-member {
    max-width: 150px;
    text-align: center;
  }

  .team-member img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #f1c40f;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    transition: transform 0.3s;
  }

  .team-member img:hover {
    transform: scale(1.05);
  }

  .team-member .name {
    margin-top: 10px;
    font-weight: 600;
    color: #0052cc;
  }

  .team-member .role {
    font-size: 0.95em;
    color: #333;
  }

  @media(max-width:768px){
    .team-member img{width:100px;height:100px;}
  }
  @media(max-width:480px){
    .team-member img{width:80px;height:80px;}
    .team-grid{gap:20px;}
  }
</style>
</head>
<body>
<div class="lesson-container">
  <div class="lesson-header">
    <h1>Week 13</h1>
    <h2>Understanding the Self – Eastern & Western Perspectives</h2>
  </div>

  <div class="lesson-content" id="lesson-content">
    <!-- Generate 50 paragraphs for testing -->
    <script>
      const lessonContentDiv = document.currentScript.parentNode;
      for(let i=1; i<=50; i++){
        const p = document.createElement("p");
        p.textContent = `Paragraph ${i}: Lorem ipsum dolor sit amet, consectetur adipiscing elit. 
        Integer nec odio. Praesent libero. Sed cursus ante dapibus diam. Sed nisi. 
        Nulla quis sem at nibh elementum imperdiet. Duis sagittis ipsum. Praesent mauris. 
        Fusce nec tellus sed augue semper porta. Mauris massa. ${i} Example long lesson content for testing.`;
        lessonContentDiv.appendChild(p);
      }
    </script>
  </div>

  <!-- Profile Section -->
  <div class="profile-section">
    <h3>Team Profiles</h3>
    <div class="team-grid">
      <!-- Instructor -->
      <div class="team-member">
        <img src="images/instructor.jpg" alt="Instructor">
        <div class="name">Ma'am Angel May B. Tano</div>
        <div class="role">Instructor</div>
      </div>

      <!-- Leader -->
      <div class="team-member">
        <img src="images/leader.jpg" alt="Leader">
        <div class="name">Jasmin Ignacio</div>
        <div class="role">Leader</div>
      </div>

      <!-- Members -->
      <div class="team-member">
        <img src="images/member1.jpg" alt="Member 1">
        <div class="name">James Fernandez</div>
        <div class="role">Member</div>
      </div>

      <div class="team-member">
        <img src="images/member2.jpg" alt="Member 2">
        <div class="name">Maria Cruz</div>
        <div class="role">Member</div>
      </div>

      <div class="team-member">
        <img src="images/member3.jpg" alt="Member 3">
        <div class="name">John Doe</div>
        <div class="role">Member</div>
      </div>

      <div class="team-member">
        <img src="images/member4.jpg" alt="Member 4">
        <div class="name">Ana Santos</div>
        <div class="role">Member</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
